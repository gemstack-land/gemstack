name: Website Deployment
on:
  push:
    # Only deploy upon new commits to `main`
    branches:
      - main
    # Only run this workflow if there are changes in the following
    paths:
      - packages/the-framework.ai/**
      - .github/workflows/website-deploy.yml
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The landing page (the-framework.ai) is a static export — no build step.
      # The folder ships its own `CNAME` and `.nojekyll`, so `clean: true` can
      # wipe the branch on each deploy without losing them.
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: packages/the-framework.ai
          # Remove previous build files
          clean: true
          # Remove history — avoiding exploding Git repository size
          single-commit: true
permissions:
  contents: write
